<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>qbitview</title>
  <script>
    function applyTheme(theme) {
      document.documentElement.classList.toggle("dark", theme === "dark");
    }

    function detectSystemTheme() {
      const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

      applyTheme(mediaQuery.matches ? "dark" : "light");

      mediaQuery.addEventListener("change", (e) => {
        console.log("System theme change detected");
        const newTheme = e.matches ? "dark" : "light";
        applyTheme(newTheme);
        console.log("System theme changed to:", newTheme);
      });
    }

    detectSystemTheme();
  </script>
  <style>
    html.dark {
      color-scheme: dark;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    !(function () {
      var currentColor = localStorage.getItem("currentColor") || '"neutral"';
      var currentRadius = localStorage.getItem("currentRadius") || "0.5";
      document.body.classList.add(`theme-${currentColor.slice(1, -1)}`);
      document.body.style.setProperty("--radius", `${currentRadius}rem`);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
